[package]
name = "vi_node"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
publish = false

# Must NOT be part of vi_rs's workspace — explicit empty workspace section
# isolates this crate so path deps to ../../vi_rs/* do not pull vi_node into
# their workspace.
[workspace]

[[bin]]
name = "vi_node"
path = "src/main.rs"

[lib]
name = "vi_node"
path = "src/lib.rs"

[dependencies]
ndarray            = "0.16"
crossbeam-channel  = "0.5"
anyhow             = "1"
thiserror          = "1"
# Used by main.rs to bridge the action server's blocking feedback/join thread
# back to the rclrs `futures`-based async callback (oneshot channel). rclrs has
# no tokio runtime, so we await a futures oneshot rather than use tokio timers.
futures            = "0.3"

vi_core      = { path = "../../vi_rs/vi_core" }
# u64 (本家忠実) ソルバ群 + ValueIterator。u16 の vi_algorithm/vi_fixtures から移行。
vi_reference = { path = "../../vi_rs/vi_reference" }

# ROS deps. colcon-ros-cargo generates a `.cargo/config.toml` that
# `[patch.crates-io]`-redirects these to the locally-built crates (rclrs 0.7.0
# from ros2_rust @ 2c6b926; the std/nav/geometry msg crates ship ROS pkg 4.9.x;
# vi_interfaces is generated by this workspace). Use `*` (as the upstream rclrs
# examples do) so the patched local versions are selected; the build script puts
# the generated config where cargo will discover it (see scripts/ros2_build.sh).
rclrs         = "*"
std_msgs      = "*"
nav_msgs      = "*"
geometry_msgs = "*"
vi_interfaces = "*"

# Optional: rayon thread-pool for parallel VI sweeps.
rayon = { version = "1.10", optional = true }

[features]
default     = ["parallel"]
online      = []
# u64 ソルバはシリアル。rayon プールは vestigial（init_rayon のみ）だが、ROS パラメータ
# thread_num との互換のためフラグは残す。
parallel    = ["dep:rayon"]
integration = []

[dev-dependencies]
proptest = "1"
